version: '3.8'

services:
  # ── 后端 ──
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: lawa2-backend
    ports:
      - "6290:6290"
    volumes:
      - ./data:/app/data
    environment:
      - LAWA2_ENFORCE_AUTH=false
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6290/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── 前端 ──
  frontend:
    build:
      context: ./frontend
      dockerfile: ../Dockerfile.frontend
    container_name: lawa2-frontend
    ports:
      - "6292:80"
    depends_on:
      - backend
    restart: unless-stopped

  # ── Nginx 反向代理 ──
  nginx:
    image: nginx:alpine
    container_name: lawa2-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
